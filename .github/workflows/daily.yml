name: Daily price update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Install browser for Playwright
        run: python -m playwright install chromium --with-deps
      - name: Run all scrapers
        run: python scraper/scrape.py
      - name: Save updated prices
        run: |
          git config user.name  "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/retro-data.js scraper/price-history.json
          if git diff --cached --quiet; then
            echo "No price changes today."
          else
            git commit -m "Daily price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
