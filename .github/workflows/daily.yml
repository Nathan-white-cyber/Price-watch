name: Daily price update

# Runs every day at 06:00 UTC, and can also be run on demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # lets the job save the updated prices back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run the scraper
        run: python scraper/scrape.py

      - name: Save updated prices
        run: |
          git config user.name  "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/retro-data.js scraper/price-history.json
          if git diff --cached --quiet; then
            echo "No price changes today."
          else
            git commit -m "Daily price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
